[server]
port = 8080

[alert]
threshold = 100.0          # Median latency threshold in ms
consecutive_count = 3      # Consecutive intervals (minutes) > threshold to trigger alert
cooldown_minutes = 30     # Cooldown minutes between notifications for the same node

[telegram]
token = "your_bot_token"
chat_id = "your_chat_id"

[[vps_list]]

id = "example-node-1"
name = "Example Server 1"
ip = "1.1.1.1"
country = "US"
remarks = "Example remarks"

[[vps_list]]
id = "example-node-2"
name = "Example Server 2"
ip = "8.8.8.8"
country = "Global"
remarks = ""
